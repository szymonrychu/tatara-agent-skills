name: release

# Push-CD: seed a semver tag for the plugin source and propagate the new ref
# into the wrapper's TATARA_SKILLS_REF Dockerfile pin. No image, no chart -
# skills is source the wrapper clones at the pinned git ref.
#
# Gated on a green lint.yml run for the same main commit (workflow_run). The
# cd-release composite action lives once in tatara-helmfile and carries all
# tag + bump + label logic; this repo only declares its outgoing edge.

on:
  workflow_run:
    workflows: [lint]
    types: [completed]

permissions:
  contents: write

jobs:
  release:
    name: Tag semver and propagate skills ref to wrapper
    runs-on: ubuntu-latest
    # Only after lint succeeds, only for push-to-main (not PR validation runs).
    # The last guard breaks the recursion: the plugin.json self-pin PR merge
    # is itself a push to main that reruns lint -> would retrigger this job
    # and re-tag forever. head_commit is populated on workflow_run events
    # triggered by a push (github.event.workflow_run.event == 'push' above),
    # so its message reliably reflects the commit that fired lint.yml here.
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push' &&
      github.event.workflow_run.head_branch == 'main' &&
      !startsWith(github.event.workflow_run.head_commit.message, 'chore: pin plugin.json')

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          # Full history + tags so cd-release tag can read the latest semver tag.
          fetch-depth: 0
          fetch-tags: true

      # mode=tag: read the merged PR's semver:<level> label for this commit,
      # bump the latest tag, and push skills vX.Y.Z.
      - name: Tag semver (skills vX.Y.Z)
        id: tag
        uses: szymonrychu/tatara-helmfile/.github/actions/cd-release@main
        with:
          mode: tag
          token: ${{ secrets.TATARA_CD_TOKEN }}

      # mode=bump: rewrite the wrapper Dockerfile TATARA_SKILLS_REF ARG pin to
      # the freshly cut tag and open an auto-merge PR. Single pin, no chart.
      - name: Bump wrapper TATARA_SKILLS_REF pin
        if: steps.tag.outputs.version != ''
        uses: szymonrychu/tatara-helmfile/.github/actions/cd-release@main
        with:
          mode: bump
          token: ${{ secrets.TATARA_CD_TOKEN }}
          parent_repo: szymonrychu/tatara-claude-code-wrapper
          new_value: ${{ steps.tag.outputs.version }}
          pins: |
            [
              {
                "file": "Dockerfile",
                "pattern": "^ARG TATARA_SKILLS_REF=.*$",
                "value_template": "ARG TATARA_SKILLS_REF={{version}}"
              }
            ]

      # mode=bump: the wrapper Dockerfile ENV above is only the baked DEFAULT.
      # The operator overrides TATARA_SKILLS_REF on every agent pod from
      # Project.Spec.Agent.SkillsRef, fed by tatara-helmfile's values - without
      # this edge the deployed pin freezes while releases pile up unused
      # (froze at v1.0.0 through v1.5.2; tatara-operator#421), so rewrite the
      # helmfile pin for BOTH projects to the same freshly cut tag.
      - name: Bump helmfile skillsRef pin
        if: steps.tag.outputs.version != ''
        uses: szymonrychu/tatara-helmfile/.github/actions/cd-release@main
        with:
          mode: bump
          token: ${{ secrets.TATARA_CD_TOKEN }}
          parent_repo: szymonrychu/tatara-helmfile
          new_value: ${{ steps.tag.outputs.version }}
          pins: |
            [
              {
                "file": "values/project-tatara/common.yaml",
                "pattern": "^(\\s*)skillsRef: .*$",
                "value_template": "\\1skillsRef: {{version}}"
              },
              {
                "file": "values/project-infrastructure/common.yaml",
                "pattern": "^(\\s*)skillsRef: .*$",
                "value_template": "\\1skillsRef: {{version}}"
              }
            ]

      # Self-pin: keep .claude-plugin/plugin.json's version in lockstep with
      # the tag we just cut, so it never freezes at its initial value.
      # main requires the "Validate skills and manifests" status check, and a
      # direct [skip ci] push has no check run to satisfy it - so land the
      # bump through an auto-merge PR instead (no [skip ci]: the check MUST
      # run for the PR to become mergeable). The branch is rebuilt from
      # fresh origin/main and force-pushed each run, so a stale branch left
      # over from a prior attempt is simply reset rather than causing a
      # conflict; an already-open PR for it is reused instead of duplicated.
      - name: Pin plugin.json to tag version
        if: steps.tag.outputs.version != ''
        env:
          TOKEN: ${{ secrets.TATARA_CD_TOKEN }}
          GH_TOKEN: ${{ secrets.TATARA_CD_TOKEN }}
          VERSION: ${{ steps.tag.outputs.version }}
        run: |
          set -euo pipefail
          bare="${VERSION#v}"
          branch="cd/plugin-pin-${bare}"
          title="chore: pin plugin.json to ${bare}"
          git config user.name "szymonrychu-bot"
          git config user.email "szymonrychu-bot@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${TOKEN}@github.com/${{ github.repository }}.git"

          git fetch origin main
          git checkout -B "$branch" origin/main
          jq --arg v "$bare" '.version = $v' .claude-plugin/plugin.json > /tmp/plugin.json
          mv /tmp/plugin.json .claude-plugin/plugin.json
          if git diff --quiet -- .claude-plugin/plugin.json; then
            echo "plugin.json already at ${bare}, nothing to do"
            exit 0
          fi
          git add .claude-plugin/plugin.json
          git commit -m "${title}"
          git push --force origin "${branch}:${branch}"

          pr_number="$(gh pr list --head "${branch}" --state open --json number --jq '.[0].number')"
          if [ -z "${pr_number}" ]; then
            gh pr create \
              --title "${title}" \
              --body "Automated version sync: pins .claude-plugin/plugin.json to the tag just cut by the release workflow (${VERSION})." \
              --head "${branch}" \
              --base main
          fi
          gh pr merge "${branch}" --auto --squash --delete-branch --subject "${title}"
